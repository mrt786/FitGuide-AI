services:

  # ─────────────────────────────────────────────
  # REDIS (STATE STORE)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fitguide-redis

    ports:
      - "6379:6379"

    networks:
      - fitguide-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # LLM SERVICE
  # ─────────────────────────────────────────────
  llm_service:
    build:
      context: ./services/llm_service
      dockerfile: Dockerfile
      cache_from:
        - fitguide-llm-service:latest
    image: fitguide-llm-service:latest
    container_name: fitguide-llm-service

    ports:
      - "8001:8001"

    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - MODEL_NAME=phi3:latest

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - fitguide-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # ─────────────────────────────────────────────
  # CONVERSATION SERVICE
  # ─────────────────────────────────────────────
  conversation_service:
    build:
      context: ./services/conversation_service
      dockerfile: Dockerfile
      cache_from:
        - fitguide-conversation-service:latest
    image: fitguide-conversation-service:latest
    container_name: fitguide-conversation-service

    ports:
      - "8002:8002"

    environment:
      - LLM_SERVICE_URL=http://llm_service:8001
      - REDIS_URL=redis://redis:6379/0
      - SESSION_TTL_SECONDS=86400

    depends_on:
      llm_service:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - fitguide-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # ─────────────────────────────────────────────
  # GATEWAY SERVICE (PUBLIC ENTRY)
  # ─────────────────────────────────────────────
  gateway_service:
    build:
      context: ./services/gateway_service
      dockerfile: Dockerfile
      cache_from:
        - fitguide-gateway:latest
    image: fitguide-gateway:latest
    container_name: fitguide-gateway

    ports:
      - "8000:8000"

    environment:
      - CONVERSATION_SERVICE_URL=http://conversation_service:8002
      - LLM_SERVICE_URL=http://llm_service:8001

    depends_on:
      conversation_service:
        condition: service_healthy

    networks:
      - fitguide-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


# ─────────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────────
networks:
  fitguide-network:
    driver: bridge