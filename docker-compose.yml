# =============================================================================
# FitGuide AI — Docker Compose (Microservices Architecture)
# =============================================================================
#
# Architecture:
#   Browser → gateway_service (port 8000)
#              → conversation_service (port 8002, internal)
#                 → llm_service (port 8001, internal)
#                    → Ollama (host machine, port 11434)
#
# Why Docker Compose?
#   - Defines the entire multi-service stack declaratively.
#   - Creates an internal Docker network so services communicate by name
#     (e.g., "http://llm_service:8001") without exposing internal ports.
#   - One command to start/stop everything: docker compose up / down.
#   - Each service has its own Dockerfile, dependencies, and scaling config.
#
# Ollama runs on the HOST machine (not in Docker) because:
#   - It needs direct access to CPU/GPU resources for inference.
#   - It's a long-running daemon that you typically install system-wide.
#   - Docker's extra_hosts maps "host.docker.internal" → host IP so the
#     LLM service inside Docker can reach Ollama on the host.
# =============================================================================

services:
  # ── LLM Service ──────────────────────────────────────────────────
  # Wraps Ollama with a clean streaming JSON API.
  # Only the conversation_service talks to this; not exposed to the browser.
